<svg width="400" height="400" viewBox="0 0 400 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Calle Principal (Avenida) -->
  <rect x="100" y="0" width="200" height="400" fill="#2C2C2C"/>
  <rect x="198" y="0" width="4" height="400" fill="#4A4A4A" stroke-dasharray="20 10"/>
  
  <!-- Salida de Garage / Vía Secundaria -->
  <rect x="300" y="250" width="100" height="60" fill="#3D3D3D"/>
  
  <!-- Vehículo A (En Avenida - Prioridad) -->
  <rect x="230" y="100" width="40" height="60" rx="4" fill="#EF4444"/>
  <path d="M250 160 L250 300" stroke="#EF4444" stroke-width="4" marker-end="url(#arrowhead)"/>
  
  <!-- Vehículo B (Saliendo - Debe ceder) -->
  <rect x="320" y="260" width="60" height="40" rx="4" fill="#666666"/>
  <rect x="300" y="250" width="4" height="60" fill="#EF4444"/> <!-- Línea de Pare -->

  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#EF4444" />
    </marker>
  </defs>

  <text x="120" y="50" fill="#EF4444" font-family="sans-serif" font-size="20" font-weight="bold">VÍA PRINCIPAL</text>
</svg>
