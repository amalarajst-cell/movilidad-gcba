<svg width="400" height="400" viewBox="0 0 400 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Calle -->
  <rect x="0" y="150" width="400" height="100" fill="#2C2C2C"/>
  
  <!-- Vehículo Civil -->
  <rect x="50" y="180" width="60" height="40" rx="4" fill="#666666"/>
  
  <!-- Vehículo Emergencia (Ambulancia) -->
  <rect x="250" y="175" width="80" height="50" rx="4" fill="#EF4444"/>
  <rect x="260" y="185" width="60" height="30" fill="white" rx="2"/>
  <rect x="285" y="185" width="10" height="30" fill="red"/>
  <rect x="260" y="195" width="60" height="10" fill="red"/>
  
  <!-- Luces / Destellos -->
  <circle cx="260" cy="170" r="8" fill="#3B82F6">
    <animate attributeName="opacity" values="0;1;0" dur="0.5s" repeatCount="indefinite" />
  </circle>
  <circle cx="320" cy="170" r="8" fill="#EF4444">
    <animate attributeName="opacity" values="1;0;1" dur="0.5s" repeatCount="indefinite" />
  </circle>

  <text x="120" y="130" fill="#EF4444" font-family="sans-serif" font-size="24" font-weight="bold">PRIORIDAD ABSOLUTA</text>
</svg>
