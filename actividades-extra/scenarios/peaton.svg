<svg width="400" height="400" viewBox="0 0 400 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Calle y Senda Peatonal -->
  <rect x="0" y="100" width="400" height="200" fill="#2C2C2C"/>
  
  <!-- Senda Peatonal -->
  <rect x="100" y="100" width="20" height="200" fill="#FFFFFF" opacity="0.8"/>
  <rect x="140" y="100" width="20" height="200" fill="#FFFFFF" opacity="0.8"/>
  <rect x="180" y="100" width="20" height="200" fill="#FFFFFF" opacity="0.8"/>
  <rect x="220" y="100" width="20" height="200" fill="#FFFFFF" opacity="0.8"/>
  <rect x="260" y="100" width="20" height="200" fill="#FFFFFF" opacity="0.8"/>

  <!-- Peatón -->
  <circle cx="180" cy="200" r="15" fill="#10B981"/> <!-- Cabeza -->
  <rect x="170" y="215" width="20" height="30" rx="5" fill="#10B981"/> <!-- Cuerpo -->
  <path d="M165 220 L150 240 M195 220 L210 240" stroke="#10B981" stroke-width="4"/> <!-- Brazos -->
  <path d="M175 245 L170 270 M185 245 L190 270" stroke="#10B981" stroke-width="4"/> <!-- Piernas -->

  <!-- Vehículo -->
  <rect x="300" y="170" width="80" height="50" rx="4" fill="#666666"/>
  <line x1="290" y1="150" x2="290" y2="250" stroke="#EF4444" stroke-width="6"/> <!-- Línea de Pare -->

  <text x="210" y="80" fill="#10B981" font-family="sans-serif" font-size="24" font-weight="bold">PRIORIDAD PEATÓN</text>
</svg>
