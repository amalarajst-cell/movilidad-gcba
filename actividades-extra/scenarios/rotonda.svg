<svg width="400" height="400" viewBox="0 0 400 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Rotonda Central -->
  <circle cx="200" cy="200" r="150" stroke="#4A4A4A" stroke-width="40" fill="none"/>
  <circle cx="200" cy="200" r="110" fill="#1A1A1A"/>
  
  <!-- Entradas -->
  <rect x="180" y="0" width="40" height="50" fill="#2C2C2C"/>
  <rect x="180" y="350" width="40" height="50" fill="#2C2C2C"/>
  <rect x="0" y="180" width="50" height="40" fill="#2C2C2C"/>
  <rect x="350" y="180" width="50" height="40" fill="#2C2C2C"/>
  
  <!-- Vehículo A (Dentro de la rotonda - Prioridad) -->
  <rect x="250" y="120" width="40" height="60" rx="4" fill="#EF4444" transform="rotate(45 270 150)"/>
  <path d="M240 100 A 100 100 0 0 1 150 110" stroke="#EF4444" stroke-width="4" fill="none" marker-end="url(#arrowhead)"/>
  
  <!-- Vehículo B (Intentando entrar - Debe esperar) -->
  <rect x="340" y="180" width="60" height="40" rx="4" fill="#666666"/>
  <rect x="330" y="170" width="4" height="60" fill="#3B82F6"/> <!-- Línea de espera -->

  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#EF4444" />
    </marker>
  </defs>
  
  <text x="140" y="210" fill="#EF4444" font-family="sans-serif" font-size="20" font-weight="bold">PRIORIDAD</text>
</svg>
