<svg width="400" height="400" viewBox="0 0 400 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Calle con Carril Bici -->
  <rect x="0" y="100" width="400" height="200" fill="#2C2C2C"/>
  <rect x="0" y="100" width="400" height="40" fill="#065F46" opacity="0.4"/> <!-- Carril Bici -->
  <rect x="0" y="138" width="400" height="2" fill="#FFFFFF" opacity="0.5"/>
  
  <!-- Ciclista -->
  <circle cx="150" cy="120" r="8" fill="#10B981"/> <!-- Cabeza -->
  <rect x="140" y="120" width="20" height="5" rx="2" fill="#10B981"/> <!-- Bici esquemática -->
  <path d="M150 120 L150 160" stroke="#10B981" stroke-width="2"/>
  <path d="M140 160 L160 160" stroke="#10B981" stroke-width="4"/>

  <!-- Vehículo Girando -->
  <rect x="250" y="170" width="80" height="50" rx="4" fill="#666666" transform="rotate(-30 250 170)"/>
  <path d="M280 180 L280 130" stroke="#EF4444" stroke-width="4" marker-end="url(#arrowhead)"/>

  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#EF4444" />
    </marker>
  </defs>

  <text x="210" y="80" fill="#10B981" font-family="sans-serif" font-size="20" font-weight="bold">PRIORIDAD CICLISTA</text>
</svg>
