<svg width="400" height="400" viewBox="0 0 400 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Calle Vertical -->
  <rect x="150" y="0" width="100" height="400" fill="#2C2C2C"/>
  <rect x="198" y="0" width="4" height="400" fill="#4A4A4A"/>
  
  <!-- Calle Horizontal -->
  <rect x="0" y="150" width="400" height="100" fill="#2C2C2C"/>
  <rect x="0" y="198" width="400" height="4" fill="#4A4A4A"/>
  
  <!-- Intersección Libre -->
  <rect x="150" y="150" width="100" height="100" fill="#2C2C2C"/>
  
  <!-- Vehículo B (Viene de arriba, a la izquierda de A) -->
  <rect x="180" y="80" width="40" height="60" rx="4" fill="#666666" opacity="0.5"/>
  <path d="M200 130 L200 180" stroke="#666666" stroke-width="4" stroke-dasharray="8 4" marker-end="url(#arrowhead)"/>

  <!-- Vehículo A (Viene de la derecha, tiene prioridad) -->
  <rect x="280" y="180" width="60" height="40" rx="4" fill="#EF4444"/>
  <path d="M280 200 L180 200" stroke="#EF4444" stroke-width="4" marker-end="url(#arrowhead)"/>
  
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="context-stroke" />
    </marker>
  </defs>
  
  <!-- Texto Esquemático -->
  <text x="210" y="170" fill="#EF4444" font-family="sans-serif" font-size="24" font-weight="bold">PRIORIDAD</text>
</svg>
